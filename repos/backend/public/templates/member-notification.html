<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You've been added to {{orgName}}</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="background-color: #f8f9fa; border-radius: 8px; padding: 30px; margin-bottom: 20px;">
    <h1 style="color: #1a73e8; margin-top: 0;">You've been added to {{orgName}}</h1>

    <p style="font-size: 16px; margin-bottom: 20px;">
      <strong>{{inviterName}}</strong> has added you to <strong>{{orgName}}</strong>
      on Threaded Stack with the role of <strong>{{roleType}}</strong>.
    </p>

    <a href="{{orgUrl}}"
       style="display: inline-block; background-color: #1a73e8; color: #fff; text-decoration: none;
              padding: 12px 30px; border-radius: 4px; font-weight: bold; margin: 20px 0;">
      View Organization
    </a>
  </div>

  <div style="border-top: 1px solid #e0e0e0; padding-top: 20px; font-size: 12px; color: #999;">
    <p>This is an automated email from Threaded Stack. Please do not reply to this message.</p>
  </div>
</body>
</html>
