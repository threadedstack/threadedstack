version: v2beta1
name: threadedstack


pipelines:

  # Disable the docker image build, it's handled externally
  build: null

  dev:
    run: |-
      ensure_pull_secrets --all
      run_pipelines deploy-caddy start-px start-backend

  deploy:
    run: |-
      ensure_pull_secrets --all
      run_pipelines deploy-caddy deploy-px deploy-backend

  deploy-caddy:
    run: |-
      create_deployments caddy-gateway

  deploy-px:
    run: |-
      create_deployments tdsk-proxy

  deploy-backend:
    run: |-
      create_deployments tdsk-backend

  start-px:
    run: |-
      create_deployments tdsk-proxy
      start_dev tdsk-proxy

  start-backend:
    run: |-
      create_deployments tdsk-backend
      start_dev tdsk-backend

vars:

# ----- General Values ----- #
  NODE_ENV:
    source: env
    default: local

  TDSK_HOST_DOMAIN:
    source: env
    default: local.threadedstack.app

# ----- Docker Image Values ----- #
  TDSK_IMAGE:
    source: env
    default: ghcr.io/threadedstack/tdsk-app
  TDSK_IMAGE_TAG:
    source: env
    default: latest

# ----- Proxy Values ----- #
  TDSK_PX_DEPLOYMENT:
    source: env
    default: tdsk-proxy
  TDSK_PX_IMAGE:
    source: env
    default: ghcr.io/threadedstack/tdsk-proxy
  TDSK_PX_IMAGE_TAG:
    source: env
    default: latest
  TDSK_PX_PORT:
    source: env
    default: 7118
  TDSK_PX_WS_PATH:
    source: env
    default: /tdsk-socket
  TDSK_PX_WS_DEBUG_PATH:
    source: env
    default: /devtools/page
  TDSK_PX_URL:
    source: env
    default: 0.0.0.0:7118

# ----- Caddy Values ----- #
  TDSK_CADDY_ACME_EMAIL:
    source: env
    default: admin@threadedstack.app
  TDSK_CADDY_ADMIN_HOST:
    source: env
    default: 0.0.0.0

  TDSK_CADDY_LOCAL_PORT:
    source: env
    default: 8080
  TDSK_CADDY_REMOTE_PORT:
    source: env
    default: 80
  TDSK_CADDY_SECURE_LOCAL_PORT:
    source: env
    default: 8443
  TDSK_CADDY_SECURE_REMOTE_PORT:
    source: env
    default: 443
  TDSK_CADDY_ADMIN_PORT:
    source: env
    default: 2019
  TDSK_CADDY_PX_HOST:
    source: env
    default: px.local.threadedstack.app
  TDSK_CADDY_DEPLOYMENT:
    source: env
    default: tdsk-caddy
  TDSK_CADDY_IMAGE_TAG:
    source: env
    default: latest
  TDSK_CADDY_IMAGE:
    source: env
    default: ghcr.io/threadedstack/tdsk-caddy
  TDSK_CADDY_TLS_MODE:
    source: env
    default: internal


# ----- Backend Values ----- #
  TDSK_BE_DEPLOYMENT:
    source: env
    default: tdsk-backend
  TDSK_BE_IMAGE:
    source: env
    default: ghcr.io/threadedstack/tdsk-backend
  TDSK_BE_IMAGE_TAG:
    source: env
    default: latest
  TDSK_BE_PORT:
    source: env
    default: 7119

# ----- Kubernetes Secrets ----- #
  TDSK_KUBE_SCRT_DOC_AUTH:
    source: env
    default: docker-auth
  TDSK_KUBE_SCRT_DB_CFG:
    source: env
    default: tdsk-db-cfg
  TDSK_KUBE_SCRT_TLS_NAME:
    source: env
    default: tdsk-tls-secret
  TDSK_KUBE_SCRT_MASTER_KEY:
    source: env
    default: tdsk-master-key
  TDSK_KUBE_SCRT_PAY_CFG:
    source: env
    default: tdsk-payments-secret
  TDSK_KUBE_SCRT_EMAIL_CFG:
    source: env
    default: tdsk-email-secret

# ----- Server Configuration ----- #
  TDSK_ALLOWED_HEADERS:
    source: env
    default: 'X-PINGOTHER,Origin,X-Requested-With,Content-Type,Accept,Authorization,AuthToken,x-tdsk-host,x-tdsk-proto,x-tdsk-port,x-tdsk-route,x-tdsk-job-id,x-tdsk-subdomain,x-forwarded-subdomain,x-forwarded-port,x-forwarded-proto,x-forwarded-host,x-forwarded-for'
  TDSK_SERVER_ORIGINS:
    source: env
    default: 'http://localhost:7117,localhost,threadedstack.app,dev.threadedstack.app,proxy.dev.threadedstack.app,px.dev.threadedstack.app,px.threadedstack.app,px.local.threadedstack.app,http://0.0.0.0'


hooks:
  - events: ["before:deploy"]
    command: |-
      kubectl create configmap caddy-config --from-file=Caddyfile=./Caddyfile --dry-run=client -o yaml | kubectl apply -f -

images:
  tdsk-app:
    image: ${TDSK_IMAGE}
    createPullSecret: true
    injectRestartHelper: false
    tags:
    - '${TDSK_IMAGE_TAG}'
    - '####-${NODE_ENV}-${devspace.git.commit}'
    dockerfile: ./Dockerfile
    context: ../


# This is a list of `deployments` that DevSpace can create for this project
deployments:


  caddy-gateway:
    helm:
      upgradeArgs:
        - "--force"
      chart:
        name: ./
      valuesFiles:
        - ./values.empty.yaml
      values:
        containers:
          - name: ${TDSK_CADDY_DEPLOYMENT}
            image: ${TDSK_CADDY_IMAGE}:${TDSK_CADDY_IMAGE_TAG}
            imagePullPolicy: IfNotPresent
            env:
              - name: TDSK_PX_PORT
                value: ${TDSK_PX_PORT}
              - name: TDSK_PX_DEPLOYMENT
                value: ${TDSK_PX_DEPLOYMENT}

              - name: TDSK_CADDY_ADMIN_PORT
                value: ${TDSK_CADDY_ADMIN_PORT}
              - name: TDSK_CADDY_LOCAL_PORT
                value: ${TDSK_CADDY_LOCAL_PORT}
              - name: TDSK_CADDY_REMOTE_PORT
                value: ${TDSK_CADDY_REMOTE_PORT}
              - name: TDSK_CADDY_SECURE_LOCAL_PORT
                value: ${TDSK_CADDY_SECURE_LOCAL_PORT}
              - name: TDSK_CADDY_SECURE_REMOTE_PORT
                value: ${TDSK_CADDY_SECURE_REMOTE_PORT}

              - name: TDSK_CADDY_PX_HOST
                value: ${TDSK_CADDY_PX_HOST}
              - name: TDSK_SERVER_ORIGINS
                value: ${TDSK_SERVER_ORIGINS}
              - name: TDSK_ALLOWED_HEADERS
                value: ${TDSK_ALLOWED_HEADERS}
              - name: TDSK_CADDY_TLS_MODE
                value: ${TDSK_CADDY_TLS_MODE}
              - name: TDSK_CADDY_ADMIN_HOST
                value: ${TDSK_CADDY_ADMIN_HOST}
              - name: TDSK_CADDY_ACME_EMAIL
                value: ${TDSK_CADDY_ACME_EMAIL}
              - name: TDSK_CADDY_ADMIN_HOST
                value: ${TDSK_CADDY_ADMIN_HOST}
              - name: TDSK_DB_AUTH_URL
                valueFrom:
                  secretKeyRef:
                    key: aurl
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: false
            volumeMounts:
              - containerPath: /etc/caddy/Caddyfile
                volume:
                  subPath: Caddyfile
                  name: caddy-config
                  readOnly: true
            ports:
              - containerPort: ${TDSK_CADDY_REMOTE_PORT}
              - containerPort: ${TDSK_CADDY_SECURE_REMOTE_PORT}
        volumes:
          - name: caddy-config
            configMap:
              name: caddy-config
        service:
          name: caddy-gateway
          type: LoadBalancer
          ports:
            - port: ${TDSK_CADDY_LOCAL_PORT}
              containerPort: ${TDSK_CADDY_REMOTE_PORT}
              name: caddy-gateway-insecure
            - port: ${TDSK_CADDY_SECURE_LOCAL_PORT}
              containerPort: ${TDSK_CADDY_SECURE_REMOTE_PORT}
              name: caddy-gateway-secure
            - port: ${TDSK_CADDY_ADMIN_PORT}
              name: caddy-gateway-admin

  tdsk-proxy:
    helm:
      upgradeArgs:
        - "--force"
      chart:
        name: ./
      valuesFiles:
        - ./values.empty.yaml
      values:
        containers:
          - name: ${TDSK_PX_DEPLOYMENT}
            image: ${TDSK_PX_IMAGE}:${TDSK_PX_IMAGE_TAG}
            imagePullPolicy: IfNotPresent
            env:
            - name: TDSK_SUB_REPO
              value: proxy
            - name: TDSK_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  key: token
                  name: ${TDSK_KUBE_SCRT_MASTER_KEY}
                  optional: false
            - name: TDSK_DB_URL
              valueFrom:
                secretKeyRef:
                  key: url
                  name: ${TDSK_KUBE_SCRT_DB_CFG}
                  optional: false
            - name: TDSK_DB_TYPE
              valueFrom:
                secretKeyRef:
                  key: type
                  name: ${TDSK_KUBE_SCRT_DB_CFG}
                  optional: false
            - name: TDSK_DB_NAME
              valueFrom:
                secretKeyRef:
                  key: name
                  name: ${TDSK_KUBE_SCRT_DB_CFG}
                  optional: false
            - name: TDSK_DB_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  key: key
                  name: ${TDSK_KUBE_SCRT_DB_CFG}
                  optional: true
            - name: TDSK_DB_JWT_SCRT
              valueFrom:
                secretKeyRef:
                  key: jwt
                  name: ${TDSK_KUBE_SCRT_DB_CFG}
                  optional: true
            - name: TDSK_DB_USER
              valueFrom:
                secretKeyRef:
                  key: user
                  name: ${TDSK_KUBE_SCRT_DB_CFG}
                  optional: true
            - name: TDSK_DB_PASS
              valueFrom:
                secretKeyRef:
                  key: pass
                  name: ${TDSK_KUBE_SCRT_DB_CFG}
                  optional: true
            - name: TDSK_DB_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  key: project
                  name: ${TDSK_KUBE_SCRT_DB_CFG}
                  optional: true
            - name: TDSK_DB_SRV_ROLE
              valueFrom:
                secretKeyRef:
                  key: role
                  name: ${TDSK_KUBE_SCRT_DB_CFG}
                  optional: true

        service:
          name: ${TDSK_PX_DEPLOYMENT}
          ports:
            - port: ${TDSK_PX_PORT}
              name: tdsk-proxy

  tdsk-backend:
    helm:
      upgradeArgs:
        - "--force"
      chart:
        name: ./
      valuesFiles:
        - ./values.empty.yaml
        - ./values.yaml
        - ./values.${NODE_ENV}.yaml
      values:
        containers:
          - name: ${TDSK_BE_DEPLOYMENT}
            image: ${TDSK_BE_IMAGE}:${TDSK_BE_IMAGE_TAG}
            imagePullPolicy: IfNotPresent
            env:
              - name: TDSK_SUB_REPO
                value: backend
              - name: TDSK_MASTER_KEY
                valueFrom:
                  secretKeyRef:
                    key: token
                    name: ${TDSK_KUBE_SCRT_MASTER_KEY}
                    optional: false
              - name: TDSK_DB_URL
                valueFrom:
                  secretKeyRef:
                    key: url
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: false
              - name: TDSK_DB_TYPE
                valueFrom:
                  secretKeyRef:
                    key: type
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: false
              - name: TDSK_DB_NAME
                valueFrom:
                  secretKeyRef:
                    key: name
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: false
              - name: TDSK_DB_PUBLIC_KEY
                valueFrom:
                  secretKeyRef:
                    key: key
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_JWT_SCRT
                valueFrom:
                  secretKeyRef:
                    key: jwt
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_USER
                valueFrom:
                  secretKeyRef:
                    key: user
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_PASS
                valueFrom:
                  secretKeyRef:
                    key: pass
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_PROJECT_ID
                valueFrom:
                  secretKeyRef:
                    key: project
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_SRV_ROLE
                valueFrom:
                  secretKeyRef:
                    key: role
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_PAY_URL
                valueFrom:
                  secretKeyRef:
                    key: url
                    name: ${TDSK_KUBE_SCRT_PAY_CFG}
                    optional: true
              - name: TDSK_PAY_TYPE
                valueFrom:
                  secretKeyRef:
                    key: type
                    name: ${TDSK_KUBE_SCRT_PAY_CFG}
                    optional: true
              - name: TDSK_PAY_PLANS
                valueFrom:
                  secretKeyRef:
                    key: plans
                    name: ${TDSK_KUBE_SCRT_PAY_CFG}
                    optional: true
              - name: TDSK_PAY_ACCESS_TOKEN
                valueFrom:
                  secretKeyRef:
                    key: token
                    name: ${TDSK_KUBE_SCRT_PAY_CFG}
                    optional: true
              - name: TDSK_PAY_WEBHOOK_SECRET
                valueFrom:
                  secretKeyRef:
                    key: webhook
                    name: ${TDSK_KUBE_SCRT_PAY_CFG}
                    optional: true
              - name: TDSK_EMAIL_HOST
                valueFrom:
                  secretKeyRef:
                    key: host
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_EMAIL_TYPE
                valueFrom:
                  secretKeyRef:
                    key: type
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_EMAIL_USER
                valueFrom:
                  secretKeyRef:
                    key: user
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_EMAIL_PASS
                valueFrom:
                  secretKeyRef:
                    key: pass
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_EMAIL_PORT
                valueFrom:
                  secretKeyRef:
                    key: port
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_EMAIL_API_KEY
                valueFrom:
                  secretKeyRef:
                    key: key
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_EMAIL_API_HOST
                valueFrom:
                  secretKeyRef:
                    key: api
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_EMAIL_SECURE
                valueFrom:
                  secretKeyRef:
                    key: secure
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true

        service:
          name: ${TDSK_BE_DEPLOYMENT}
          ports:
            - port: ${TDSK_BE_PORT}
        #ingress:
        #  tls: false
        #  labels: null
        #  name: ${TDSK_BE_DEPLOYMENT}-ingress
        #  rules:
        #    - host: be.${TDSK_HOST_DOMAIN}
        #      serviceName: ${TDSK_BE_DEPLOYMENT}
        #      servicePort: ${TDSK_BE_PORT}
        #    - host: '*.be.${TDSK_HOST_DOMAIN}'
        #      serviceName: ${TDSK_BE_DEPLOYMENT}
        #      servicePort: ${TDSK_BE_PORT}


# This is a list of `dev` containers that are based on the containers created by your deployments
dev:

  caddy-gateway:
    labelSelector:
      app.kubernetes.io/component: ${TDSK_CADDY_DEPLOYMENT}
    devImage: ${TDSK_CADDY_IMAGE}:${TDSK_CADDY_IMAGE_TAG}
    logs: {}
    sync:
      - path: ../:/tdsk
        excludePaths:
          - .*
          - '**'
          - '!/deploy'
    ports:
      - port: "${TDSK_CADDY_LOCAL_PORT}:${TDSK_CADDY_REMOTE_PORT}"
      - port: "${TDSK_CADDY_SECURE_LOCAL_PORT}:${TDSK_CADDY_SECURE_REMOTE_PORT}"
      - port: ${TDSK_CADDY_ADMIN_PORT}


  tdsk-proxy:
    container: tdsk-proxy
    labelSelector:
      app.kubernetes.io/component: ${TDSK_PX_DEPLOYMENT}
    devImage: ghcr.io/threadedstack/tdsk-proxy:latest
    logs: {}
    sync:
      - path: ../:/tdsk
        excludePaths:
          - .*
          - '**'
          - '!/deploy'
          - '!/configs'
          - '!/repos/domain'
          - '!/repos/database'
          - '!/repos/logger'
          - '!/repos/proxy'
          - '!/tsconfig.json'
          - /repos/database/dist
          - /repos/domain/dist
          - /repos/logger/dist
          - /repos/proxy/dist
          - node_modules
          - node_modules/**
          - deploy/scripts
          - deploy/.devspace
          - deploy/templates
        printLogs: true
        waitInitialSync: true
        disableDownload: true
        initialSync: mirrorLocal
    ports:
      - port: ${TDSK_PX_PORT}
    #ssh:
    #  enabled: true

  tdsk-backend:
    labelSelector:
      app.kubernetes.io/component: ${TDSK_BE_DEPLOYMENT}
    devImage: ghcr.io/threadedstack/tdsk-backend:latest
    logs: {}
    sync:
      - path: ../:/tdsk
        excludePaths:
          - .*
          - '**'
          - '!/deploy'
          - '!/configs'
          - '!/repos/agent'
          - '!/repos/backend'
          - '!/repos/database'
          - '!/repos/domain'
          - '!/repos/logger'
          - '!/repos/shell'
          - '!/repos/wasm'
          - '!/tsconfig.json'
          - /repos/agent/dist
          - /repos/backend/dist
          - /repos/database/dist
          - /repos/domain/dist
          - /repos/logger/dist
          - /repos/shell/dist
          - /repos/wasm/dist
          - node_modules
          - node_modules/**
          - deploy/scripts
          - deploy/.devspace
          - deploy/templates
        printLogs: true
        waitInitialSync: true
        disableDownload: true
        initialSync: mirrorLocal
    ports:
      - port: ${TDSK_BE_PORT}
    #ssh:
    #  enabled: true

# Use profile to dynamically set options based on the environment
profiles:
- name: local
  #patches:
  #- op: replace
  #  path: deployments.tdsk-proxy.helm.values.containers[0].image
  #  value: ${TDSK_IMAGE}:${TDSK_IMAGE_TAG}
  #- op: replace
  #  path: deployments.tdsk-backend.helm.values.containers[0].image
  #  value: ${TDSK_IMAGE}:${TDSK_IMAGE_TAG}
- name: production
