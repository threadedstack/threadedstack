# Bypass the tdsk CLI:
#  - Run the from the root directory:
#   DEVSPACE_CONFIG="/Users/LanceTipton/keg-cli/external/apps/threaded-stack/deploy/devspace.yaml" devspace --namespace tdsk-local --kube-context docker-desktop --profile local dev

version: v2beta1
name: threadedstack


pipelines:

  # Disable the docker image build, it's handled externally
  build: null

  dev:
    run: |-
      ensure_pull_secrets --all
      run_pipelines start-caddy start-px start-backend deploy-embeddings

  deploy:
    run: |-
      ensure_pull_secrets --all
      # Warm-up (helm race fix): deploy the FIRST chart alone so DevSpace
      # provisions its own helm binary (downloaded to ~/.devspace/bin/helm at
      # whatever version it wants) exactly once, serially. The remaining charts
      # then deploy in parallel against the already-present binary. Without
      # this, the parallel create_deployments calls each trigger a concurrent
      # helm download to the same path and race, failing with
      # `fork/exec ~/.devspace/bin/helm: text file busy` (run 28717891612).
      # Zero maintenance: DevSpace chooses the version, we pin nothing.
      run_pipelines deploy-caddy
      run_pipelines deploy-px deploy-backend deploy-embeddings

  deploy-caddy:
    run: |-
      create_deployments tdsk-caddy

  deploy-px:
    run: |-
      create_deployments tdsk-proxy

  deploy-backend:
    run: |-
      create_deployments tdsk-backend

  deploy-embeddings:
    run: |-
      create_deployments tdsk-embeddings

  start-caddy:
    run: |-
      create_deployments tdsk-caddy
      start_dev tdsk-caddy

  start-px:
    run: |-
      create_deployments tdsk-proxy
      start_dev tdsk-proxy

  start-backend:
    run: |-
      create_deployments tdsk-backend
      start_dev tdsk-backend

vars:

# ----- General Values ----- #
  NODE_ENV:
    source: env
    default: local

  TDSK_HOST_DOMAIN:
    source: env
    default: threadedstack.app

# ----- Docker Image Values ----- #
  TDSK_IMAGE:
    source: env
    default: ghcr.io/threadedstack/tdsk-app
  TDSK_IMAGE_TAG:
    source: env
    default: latest

# ----- Proxy Values ----- #
  TDSK_PX_DEPLOYMENT:
    source: env
    default: tdsk-proxy
  TDSK_PX_IMAGE:
    source: env
    default: ghcr.io/threadedstack/tdsk-proxy
  TDSK_PX_IMAGE_TAG:
    source: env
    default: latest
  TDSK_PX_PORT:
    source: env
    default: 7118
  TDSK_PX_WS_PATH:
    source: env
    default: /tdsk-socket
  TDSK_PX_WS_DEBUG_PATH:
    source: env
    default: /devtools/page
  TDSK_PX_URL:
    source: env
    default: 0.0.0.0:7118

# ----- Caddy Values ----- #
  TDSK_CADDY_ACME_EMAIL:
    source: env
    default: admin@threadedstack.com
  TDSK_CADDY_ADMIN_HOST:
    source: env
    default: 0.0.0.0

  TDSK_CADDY_LOCAL_PORT:
    source: env
    default: 8080
  TDSK_CADDY_REMOTE_PORT:
    source: env
    default: 80
  TDSK_CADDY_SECURE_LOCAL_PORT:
    source: env
    default: 443
  TDSK_CADDY_SECURE_REMOTE_PORT:
    source: env
    default: 443
  TDSK_CADDY_ADMIN_PORT:
    source: env
    default: 2019
  TDSK_CADDY_PX_HOST:
    source: env
    default: px.local.threadedstack.app
  TDSK_CADDY_DEPLOYMENT:
    source: env
    default: tdsk-caddy
  TDSK_CADDY_IMAGE_TAG:
    source: env
    default: latest
  TDSK_CADDY_IMAGE:
    source: env
    default: ghcr.io/threadedstack/tdsk-caddy

# ----- Backend Values ----- #
  TDSK_BE_DEPLOYMENT:
    source: env
    default: tdsk-backend
  TDSK_BE_IMAGE:
    source: env
    default: ghcr.io/threadedstack/tdsk-backend
  TDSK_BE_IMAGE_TAG:
    source: env
    default: latest
  TDSK_BE_PORT:
    source: env
    default: 7119
  TDSK_BE_EGRESS_PORT:
    source: env
    default: 8889
  TDSK_KUBE_SCRT_EGRESS_CA:
    source: env
    default: tdsk-egress-ca

# ----- Embeddings Values ----- #
# Self-hosted HF Text Embeddings Inference (TEI). Serves an OpenAI-compatible
# /v1/embeddings API from a small HF model, replacing the external Google/OpenAI
# embedding dependency for agent memory. Internal ClusterIP service — reached by
# the backend at http://${TDSK_EMB_DEPLOYMENT}:${TDSK_EMB_PORT}/v1.
  TDSK_EMB_DEPLOYMENT:
    source: env
    default: tdsk-embeddings
  TDSK_EMB_IMAGE:
    source: env
    default: ghcr.io/huggingface/text-embeddings-inference
  TDSK_EMB_IMAGE_TAG:
    source: env
    default: cpu-1.6
  TDSK_EMB_PORT:
    source: env
    default: 3000
  TDSK_EMB_MODEL:
    source: env
    default: BAAI/bge-large-en-v1.5
  TDSK_EMB_CACHE_SIZE:
    source: env
    default: 10Gi

# ----- Kubernetes Secrets ----- #
  TDSK_KUBE_SCRT_DOC_AUTH:
    source: env
    default: docker-auth
  TDSK_KUBE_SCRT_DOC_PULL:
    source: env
    default: docker-auth-pull
  TDSK_KUBE_SCRT_DB_CFG:
    source: env
    default: tdsk-db-cfg
  TDSK_KUBE_SCRT_TLS_NAME:
    source: env
    default: tdsk-tls-secret
  TDSK_KUBE_SCRT_MASTER_KEY:
    source: env
    default: tdsk-master-key
  TDSK_KUBE_SCRT_PAY_CFG:
    source: env
    default: tdsk-payments-secret
  TDSK_KUBE_SCRT_EMAIL_CFG:
    source: env
    default: tdsk-email-secret
  TDSK_KUBE_SCRT_S3_CFG:
    source: env
    default: tdsk-s3-secret

# ----- Server Configuration ----- #
  TDSK_ALLOWED_HEADERS:
    source: env
    default: 'X-PINGOTHER,Origin,X-Requested-With,Content-Type,Accept,Authorization,AuthToken,x-tdsk-host,x-tdsk-proto,x-tdsk-port,x-tdsk-route,x-tdsk-job-id,x-tdsk-subdomain,x-forwarded-subdomain,x-forwarded-port,x-forwarded-proto,x-forwarded-host,x-forwarded-for,x-user-id,x-user-role,x-user-email'
  TDSK_SERVER_ORIGINS:
    source: env
    default: 'http://localhost:7117,localhost,threadedstack.app,dev.threadedstack.app,local.threadedstack.app,px.threadedstack.app,px.dev.threadedstack.app,px.local.threadedstack.app,sandbox.threadedstack.app,sandbox.dev.threadedstack.app,sandbox.local.threadedstack.app,http://0.0.0.0'


hooks:
  - events: ["before:deploy:tdsk-caddy"]
    silent: true
    command: |-
      kubectl create configmap caddy-config -n ${devspace.namespace} --context ${devspace.context} --from-file=Caddyfile="./Caddyfile" --dry-run=client -o yaml | kubectl apply -n ${devspace.namespace} --context ${devspace.context} -f -

images:
  tdsk-app:
    image: ${TDSK_IMAGE}
    createPullSecret: true
    injectRestartHelper: false
    tags:
    - '${TDSK_IMAGE_TAG}'
    - '####-${NODE_ENV}-${devspace.git.commit}'
    dockerfile: ./Dockerfile.app
    context: ../


# This is a list of `deployments` that DevSpace can create for this project
deployments:


  tdsk-caddy:
    helm:
      upgradeArgs:
        - "--force"
      chart:
        name: ./
      valuesFiles:
        - ./values.empty.yaml
      values:
        # Pin caddy off the flappy medium pool and onto the stable embed pool
        # (same node as backend + proxy). Caddy is the TLS/LB frontend on the
        # request path; a NodeNotReady flap here drops user-facing traffic.
        nodeSelector:
          kubernetes.civo.com/civo-node-pool: tdskembed
        containers:
          - name: ${TDSK_CADDY_DEPLOYMENT}
            image: ${TDSK_CADDY_IMAGE}:${TDSK_CADDY_IMAGE_TAG}
            imagePullPolicy: IfNotPresent
            env:
              - name: TDSK_WITH_LB_PROXY
                value: true
              - name: TDSK_IN_KUBE
                value: true
              - name: TDSK_PX_PORT
                value: ${TDSK_PX_PORT}
              - name: TDSK_PX_DEPLOYMENT
                value: ${TDSK_PX_DEPLOYMENT}

              - name: TDSK_HOST_DOMAIN
                value: ${TDSK_HOST_DOMAIN}

              - name: TDSK_CADDY_ADMIN_PORT
                value: ${TDSK_CADDY_ADMIN_PORT}
              - name: TDSK_CADDY_LOCAL_PORT
                value: ${TDSK_CADDY_LOCAL_PORT}
              - name: TDSK_CADDY_REMOTE_PORT
                value: ${TDSK_CADDY_REMOTE_PORT}
              - name: TDSK_CADDY_SECURE_LOCAL_PORT
                value: ${TDSK_CADDY_SECURE_LOCAL_PORT}
              - name: TDSK_CADDY_SECURE_REMOTE_PORT
                value: ${TDSK_CADDY_SECURE_REMOTE_PORT}

              - name: TDSK_CADDY_PX_HOST
                value: ${TDSK_CADDY_PX_HOST}
              - name: TDSK_SERVER_ORIGINS
                value: ${TDSK_SERVER_ORIGINS}
              - name: TDSK_ALLOWED_HEADERS
                value: ${TDSK_ALLOWED_HEADERS}
              - name: TDSK_CADDY_ADMIN_HOST
                value: ${TDSK_CADDY_ADMIN_HOST}
              - name: TDSK_CADDY_ACME_EMAIL
                value: ${TDSK_CADDY_ACME_EMAIL}
              - name: TDSK_CADDY_ADMIN_HOST
                value: ${TDSK_CADDY_ADMIN_HOST}
              - name: TDSK_DB_AUTH_URL
                valueFrom:
                  secretKeyRef:
                    key: aurl
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: false
            volumeMounts:
              - containerPath: /etc/caddy/Caddyfile
                volume:
                  subPath: Caddyfile
                  name: caddy-config
                  readOnly: true
            ports:
              - containerPort: ${TDSK_CADDY_REMOTE_PORT}
              - containerPort: ${TDSK_CADDY_SECURE_REMOTE_PORT}
        volumes:
          - name: caddy-config
            configMap:
              name: caddy-config
        service:
          name: tdsk-caddy
          type: LoadBalancer
          ports:
            - port: ${TDSK_CADDY_LOCAL_PORT}
              containerPort: ${TDSK_CADDY_REMOTE_PORT}
              name: tdsk-caddy-insecure
            - port: ${TDSK_CADDY_SECURE_LOCAL_PORT}
              containerPort: ${TDSK_CADDY_SECURE_REMOTE_PORT}
              name: tdsk-caddy-secure
            - port: ${TDSK_CADDY_ADMIN_PORT}
              name: tdsk-caddy-admin

  tdsk-proxy:
    helm:
      upgradeArgs:
        - "--force"
      chart:
        name: ./
      valuesFiles:
        - ./values.empty.yaml
      values:
        # Match tdsk-backend's node pin. Proxy is on the request path between
        # the client and the backend, so co-locating on the same stable node
        # keeps latency low and avoids re-fanning traffic across a flappy
        # medium-pool node.
        nodeSelector:
          kubernetes.civo.com/civo-node-pool: tdskembed
        containers:
          - name: ${TDSK_PX_DEPLOYMENT}
            image: ${TDSK_PX_IMAGE}:${TDSK_PX_IMAGE_TAG}
            imagePullPolicy: IfNotPresent
            env:
              - name: NODE_ENV
                value: ${NODE_ENV}
              - name: TDSK_WITH_LB_PROXY
                value: true
              - name: TDSK_IN_KUBE
                value: true
              - name: TDSK_SUB_REPO
                value: proxy
              - name: TDSK_MASTER_KEY
                valueFrom:
                  secretKeyRef:
                    key: token
                    name: ${TDSK_KUBE_SCRT_MASTER_KEY}
                    optional: false
              - name: TDSK_DB_URL
                valueFrom:
                  secretKeyRef:
                    key: url
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: false
              - name: TDSK_DB_TYPE
                valueFrom:
                  secretKeyRef:
                    key: type
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: false
              - name: TDSK_DB_NAME
                valueFrom:
                  secretKeyRef:
                    key: name
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: false
              - name: TDSK_DB_PUBLIC_KEY
                valueFrom:
                  secretKeyRef:
                    key: key
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_JWT_SCRT
                valueFrom:
                  secretKeyRef:
                    key: jwt
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_USER
                valueFrom:
                  secretKeyRef:
                    key: user
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_PASS
                valueFrom:
                  secretKeyRef:
                    key: pass
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_PROJECT_ID
                valueFrom:
                  secretKeyRef:
                    key: project
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_SRV_ROLE
                valueFrom:
                  secretKeyRef:
                    key: role
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true

        service:
          name: ${TDSK_PX_DEPLOYMENT}
          ports:
            - port: ${TDSK_PX_PORT}
              name: tdsk-proxy

  tdsk-backend:
    helm:
      upgradeArgs:
        - "--force"
      chart:
        name: ./
      valuesFiles:
        - ./values.empty.yaml
        - ./values.yaml
        - ./values.${NODE_ENV}.yaml
      values:
        # Pin to the tdskembed pool (higher-memory, historically stable) so the
        # backend does not land on a medium-pool node that is currently flapping
        # NodeNotReady every 5-15 min. Without this pin, kubelet on the flappy
        # node loses heartbeat while an executor tick is running mid-schedule —
        # the pod stays "Running" from the DB's perspective (no pgrep, no
        # phase transition) but the executor process is unreachable, and the
        # schedule_run row stays orphaned until the pod is force-deleted.
        nodeSelector:
          kubernetes.civo.com/civo-node-pool: tdskembed
        networkPolicy:
          name: sandbox-egress-policy
          podSelector:
            tdsk.app/managed: "true"
          egressSelector:
            app.kubernetes.io/component: tdsk-backend
          egressPorts:
            - port: ${TDSK_BE_EGRESS_PORT}
        # Resident-mode pods (always-on agents) additionally reach the backend
        # API port for dispatch/records — egress is additive across policies,
        # so residents keep the MITM+DNS base allowances above.
        residentNetworkPolicy:
          name: resident-egress-policy
          podSelector:
            tdsk.app/resident: "true"
          egressSelector:
            app.kubernetes.io/component: tdsk-backend
          egressPorts:
            - port: ${TDSK_BE_PORT}
        serviceAccountName: tdsk-backend-sa
        customServiceAccount:
          name: tdsk-backend-sa
          role:
            name: tdsk-sandbox-manager
            rules:
              - apiGroups:
                  - ""
                resources:
                  - pods
                  - pods/exec
                verbs:
                  - create
                  - delete
                  - get
                  - list
                  - patch
                  - watch
              - apiGroups:
                  - ""
                resources:
                  - pods/log
                  - resourcequotas
                verbs:
                  - get
                  - list
                  - watch
              - apiGroups:
                  - apps
                resources:
                  - deployments
                verbs:
                  - get
                  - list
                  - watch
                  - patch
          binding:
            name: tdsk-sandbox-manager-binding
        containers:
          - name: ${TDSK_BE_DEPLOYMENT}
            image: ${TDSK_BE_IMAGE}:${TDSK_BE_IMAGE_TAG}
            imagePullPolicy: IfNotPresent
            # Gate rollout on the API actually listening on TDSK_BE_PORT so the
            # release's health check cannot race the backend's cold start (node +
            # ~12MB bundle + DB pool + scheduler init can exceed the verify retry
            # budget, which previously failed the deploy and rolled it back).
            # startupProbe gives up to 5m of boot grace; readinessProbe keeps the
            # old pod serving traffic until the new one is actually up.
            startupProbe:
              tcpSocket:
                port: ${TDSK_BE_PORT}
              periodSeconds: 5
              failureThreshold: 60
              timeoutSeconds: 3
            readinessProbe:
              tcpSocket:
                port: ${TDSK_BE_PORT}
              periodSeconds: 10
              failureThreshold: 3
              timeoutSeconds: 3
            env:
              - name: NODE_ENV
                value: ${NODE_ENV}
              - name: TDSK_WITH_LB_PROXY
                value: true
              - name: TDSK_IN_KUBE
                value: true
              - name: TDSK_SUB_REPO
                value: backend
              - name: TDSK_MASTER_KEY
                valueFrom:
                  secretKeyRef:
                    key: token
                    name: ${TDSK_KUBE_SCRT_MASTER_KEY}
                    optional: false
              - name: TDSK_DB_URL
                valueFrom:
                  secretKeyRef:
                    key: url
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: false
              - name: TDSK_DB_TYPE
                valueFrom:
                  secretKeyRef:
                    key: type
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: false
              - name: TDSK_DB_NAME
                valueFrom:
                  secretKeyRef:
                    key: name
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: false
              - name: TDSK_DB_PUBLIC_KEY
                valueFrom:
                  secretKeyRef:
                    key: key
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_JWT_SCRT
                valueFrom:
                  secretKeyRef:
                    key: jwt
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_USER
                valueFrom:
                  secretKeyRef:
                    key: user
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_PASS
                valueFrom:
                  secretKeyRef:
                    key: pass
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_PROJECT_ID
                valueFrom:
                  secretKeyRef:
                    key: project
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_DB_SRV_ROLE
                valueFrom:
                  secretKeyRef:
                    key: role
                    name: ${TDSK_KUBE_SCRT_DB_CFG}
                    optional: true
              - name: TDSK_PAY_URL
                valueFrom:
                  secretKeyRef:
                    key: url
                    name: ${TDSK_KUBE_SCRT_PAY_CFG}
                    optional: true
              - name: TDSK_PAY_TYPE
                valueFrom:
                  secretKeyRef:
                    key: type
                    name: ${TDSK_KUBE_SCRT_PAY_CFG}
                    optional: true
              - name: TDSK_PAY_PLANS
                valueFrom:
                  secretKeyRef:
                    key: plans
                    name: ${TDSK_KUBE_SCRT_PAY_CFG}
                    optional: true
              - name: TDSK_PAY_ACCESS_TOKEN
                valueFrom:
                  secretKeyRef:
                    key: token
                    name: ${TDSK_KUBE_SCRT_PAY_CFG}
                    optional: true
              - name: TDSK_PAY_WEBHOOK_SECRET
                valueFrom:
                  secretKeyRef:
                    key: webhook
                    name: ${TDSK_KUBE_SCRT_PAY_CFG}
                    optional: true
              - name: TDSK_EMAIL_HOST
                valueFrom:
                  secretKeyRef:
                    key: host
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_EMAIL_TYPE
                valueFrom:
                  secretKeyRef:
                    key: type
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_EMAIL_USER
                valueFrom:
                  secretKeyRef:
                    key: user
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_EMAIL_PASS
                valueFrom:
                  secretKeyRef:
                    key: pass
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_EMAIL_PORT
                valueFrom:
                  secretKeyRef:
                    key: port
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_EMAIL_API_KEY
                valueFrom:
                  secretKeyRef:
                    key: key
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_EMAIL_API_HOST
                valueFrom:
                  secretKeyRef:
                    key: api
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_EMAIL_SECURE
                valueFrom:
                  secretKeyRef:
                    key: secure
                    name: ${TDSK_KUBE_SCRT_EMAIL_CFG}
                    optional: true
              - name: TDSK_S3_BUCKET
                valueFrom:
                  secretKeyRef:
                    key: bucket
                    name: ${TDSK_KUBE_SCRT_S3_CFG}
                    optional: true
              - name: TDSK_S3_ENDPOINT
                valueFrom:
                  secretKeyRef:
                    key: endpoint
                    name: ${TDSK_KUBE_SCRT_S3_CFG}
                    optional: true
              - name: TDSK_S3_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    key: accessKeyId
                    name: ${TDSK_KUBE_SCRT_S3_CFG}
                    optional: true
              - name: TDSK_S3_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    key: secretAccessKey
                    name: ${TDSK_KUBE_SCRT_S3_CFG}
                    optional: true
              - name: TDSK_S3_REGION
                valueFrom:
                  secretKeyRef:
                    key: region
                    name: ${TDSK_KUBE_SCRT_S3_CFG}
                    optional: true
            volumeMounts:
              - containerPath: /etc/tdsk/ca
                volume:
                  name: egress-ca-cert
                  readOnly: true
        volumes:
          - name: egress-ca-cert
            secret:
              secretName: ${TDSK_KUBE_SCRT_EGRESS_CA}
              optional: true
        service:
          name: ${TDSK_BE_DEPLOYMENT}
          ports:
            - port: ${TDSK_BE_PORT}
              name: tdsk-backend-api
            - port: ${TDSK_BE_EGRESS_PORT}
              name: tdsk-backend-egress
        #ingress:
        #  tls: false
        #  labels: null
        #  name: ${TDSK_BE_DEPLOYMENT}-ingress
        #  rules:
        #    - host: be.${TDSK_HOST_DOMAIN}
        #      serviceName: ${TDSK_BE_DEPLOYMENT}
        #      servicePort: ${TDSK_BE_PORT}
        #    - host: '*.be.${TDSK_HOST_DOMAIN}'
        #      serviceName: ${TDSK_BE_DEPLOYMENT}
        #      servicePort: ${TDSK_BE_PORT}


  # Self-hosted embedding service (HF Text Embeddings Inference). Third-party
  # public image — NOT built by `tdsk release`; deployed via the deploy pipeline.
  # The model cache PVC (/data) promotes this to a StatefulSet via the chart.
  tdsk-embeddings:
    helm:
      upgradeArgs:
        - "--force"
      chart:
        name: ./
      valuesFiles:
        - ./values.empty.yaml
      values:
        containers:
          - name: ${TDSK_EMB_DEPLOYMENT}
            image: ${TDSK_EMB_IMAGE}:${TDSK_EMB_IMAGE_TAG}
            imagePullPolicy: IfNotPresent
            env:
              - name: MODEL_ID
                value: ${TDSK_EMB_MODEL}
              - name: PORT
                value: ${TDSK_EMB_PORT}
              # Persist the downloaded model to the mounted PVC so pod restarts
              # don't re-download from the HF hub.
              - name: HUGGINGFACE_HUB_CACHE
                value: /data
              - name: DTYPE
                value: float32
              # Truncate inputs over the model's 512-token limit instead of
              # erroring (memory texts vary in length; the first 512 tokens are
              # enough for retrieval). Without this, long memories fail to embed.
              - name: AUTO_TRUNCATE
                value: "true"
            volumeMounts:
              - containerPath: /data
                volume:
                  name: tdsk-emb-cache
            # bge-large-en-v1.5 (fp32 ONNX) peaks ~4-6Gi loading the model, so 4Gi
            # OOMKills on boot. Requires node(s) with >=8Gi allocatable RAM.
            resources:
              requests:
                cpu: "1"
                memory: 4Gi
              limits:
                cpu: "2"
                memory: 6Gi
        volumes:
          - name: tdsk-emb-cache
            size: ${TDSK_EMB_CACHE_SIZE}
        service:
          name: ${TDSK_EMB_DEPLOYMENT}
          ports:
            - port: ${TDSK_EMB_PORT}
              name: tdsk-emb-api


# This is a list of `dev` containers that are based on the containers created by your deployments
dev:

  tdsk-caddy:
    labelSelector:
      app.kubernetes.io/component: ${TDSK_CADDY_DEPLOYMENT}
    devImage: ${TDSK_CADDY_IMAGE}:${TDSK_CADDY_IMAGE_TAG}
    logs: {}
    sync:
      - path: ../:/tdsk
        excludePaths:
          - .*
          - '**'
          - '!/deploy'
    ports:
      - port: "${TDSK_CADDY_LOCAL_PORT}:${TDSK_CADDY_REMOTE_PORT}"
      - port: "${TDSK_CADDY_SECURE_LOCAL_PORT}:${TDSK_CADDY_SECURE_REMOTE_PORT}"
      - port: ${TDSK_CADDY_ADMIN_PORT}


  tdsk-proxy:
    container: tdsk-proxy
    labelSelector:
      app.kubernetes.io/component: ${TDSK_PX_DEPLOYMENT}
    devImage: ${TDSK_IMAGE}:${TDSK_IMAGE_TAG}
    logs: {}
    sync:
      - path: ../:/tdsk
        excludePaths:
          - .*
          - '**'
          - '!/deploy'
          - '!/configs'
          - '!/repos/domain'
          - '!/repos/database'
          - '!/repos/logger'
          - '!/repos/proxy'
          - '!/tsconfig.json'
          - /repos/database/dist
          - /repos/domain/dist
          - /repos/logger/dist
          - /repos/proxy/dist
          - node_modules
          - node_modules/**
          - deploy/scripts
          - deploy/.devspace
          - deploy/templates
        printLogs: true
        waitInitialSync: true
        disableDownload: true
        initialSync: mirrorLocal
    ports:
      - port: ${TDSK_PX_PORT}

  tdsk-backend:
    labelSelector:
      app.kubernetes.io/component: ${TDSK_BE_DEPLOYMENT}
    devImage: ${TDSK_IMAGE}:${TDSK_IMAGE_TAG}
    logs: {}
    sync:
      - path: ../:/tdsk
        excludePaths:
          - .*
          - '**'
          - '!/deploy'
          - '!/configs'
          - '!/repos/agent'
          - '!/repos/backend'
          - '!/repos/database'
          - '!/repos/domain'
          - '!/repos/logger'
          - '!/repos/sandbox'
          - '!/tsconfig.json'
          - /repos/agent/dist
          - /repos/backend/dist
          - /repos/database/dist
          - /repos/domain/dist
          - /repos/logger/dist
          - /repos/sandbox/dist
          - node_modules
          - node_modules/**
          - deploy/scripts
          - deploy/.devspace
          - deploy/templates
        printLogs: true
        waitInitialSync: true
        disableDownload: true
        initialSync: mirrorLocal
    ports:
      - port: ${TDSK_BE_PORT}

# Use profile to dynamically set options based on the environment
profiles:
- name: local
- name: production
  patches:
    # Use production images and tags
    - op: replace
      path: deployments.tdsk-caddy.helm.values.containers[0].image
      value: ghcr.io/threadedstack/tdsk-caddy:${TDSK_CADDY_IMAGE_TAG}
    - op: replace
      path: deployments.tdsk-proxy.helm.values.containers[0].image
      value: ghcr.io/threadedstack/tdsk-proxy:${TDSK_PX_IMAGE_TAG}
    - op: replace
      path: deployments.tdsk-backend.helm.values.containers[0].image
      value: ghcr.io/threadedstack/tdsk-backend:${TDSK_BE_IMAGE_TAG}

    # Always re-pull images in production (prevents stale cached images)
    - op: replace
      path: deployments.tdsk-caddy.helm.values.containers[0].imagePullPolicy
      value: Always
    - op: replace
      path: deployments.tdsk-proxy.helm.values.containers[0].imagePullPolicy
      value: Always
    - op: replace
      path: deployments.tdsk-backend.helm.values.containers[0].imagePullPolicy
      value: Always

    # Add imagePullSecrets for ghcr.io private registry
    - op: add
      path: deployments.tdsk-caddy.helm.values.pullSecrets
      value:
        - ${TDSK_KUBE_SCRT_DOC_PULL}
    - op: add
      path: deployments.tdsk-proxy.helm.values.pullSecrets
      value:
        - ${TDSK_KUBE_SCRT_DOC_PULL}
    - op: add
      path: deployments.tdsk-backend.helm.values.pullSecrets
      value:
        - ${TDSK_KUBE_SCRT_DOC_PULL}

    # Disable caddy admin interface in production
    - op: remove
      path: deployments.tdsk-caddy.helm.values.service.ports[2]

    # Add caddy labels for production deployment
    - op: add
      path: deployments.tdsk-caddy.helm.values.service.annotations
      value:
        kubernetes.civo.com/protocol: "tcp"
        kubernetes.civo.com/client-timeout: "3600s"
        kubernetes.civo.com/server-timeout: "3600s"
        kubernetes.civo.com/max-concurrent-requests: "20000"
        kubernetes.civo.com/loadbalancer-algorithm: "least_connections"
        kubernetes.civo.com/loadbalancer-enable-proxy-protocol: "send-proxy-v2"