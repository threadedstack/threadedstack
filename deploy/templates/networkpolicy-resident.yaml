{{- if $.Values.residentNetworkPolicy }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $.Values.residentNetworkPolicy.name | default "resident-egress-policy" | quote }}
  labels:
    "app.kubernetes.io/name": "tdsk-app"
    "app.kubernetes.io/component": {{ $.Release.Name | quote }}
    "app.kubernetes.io/managed-by": {{ $.Release.Service | quote }}
  annotations:
    "helm.sh/chart": "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
spec:
  # Resident-mode pods (always-on agents). NetworkPolicy egress is additive
  # across policies, so resident pods keep the base sandbox-egress-policy
  # allowances (egress MITM + DNS) and ADDITIONALLY may reach the backend API
  # port for dispatch/records. Ordinary sandboxes are not selected here.
  podSelector:
    matchLabels:
      {{- range $key, $val := $.Values.residentNetworkPolicy.podSelector }}
      {{ $key }}: {{ $val | quote }}
      {{- end }}
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- range $key, $val := $.Values.residentNetworkPolicy.egressSelector }}
              {{ $key }}: {{ $val | quote }}
              {{- end }}
      ports:
      {{- range $.Values.residentNetworkPolicy.egressPorts }}
        - port: {{ .port }}
          {{- if .protocol }}
          protocol: {{ .protocol }}
          {{- end }}
      {{- end }}
    {{- if $.Values.residentNetworkPolicy.serviceCidr }}
    # Service-VIP path: the CNI's policy enforcement does not match
    # service-DNAT'd traffic against podSelectors (verified live 2026-07-08:
    # pod-IP 200, ClusterIP timeout until this ipBlock landed). Residents call
    # the backend by ClusterIP (no cluster DNS in sandbox pods), so the service
    # CIDR must be admitted on the same ports.
    - to:
        - ipBlock:
            cidr: {{ $.Values.residentNetworkPolicy.serviceCidr | quote }}
      ports:
      {{- range $.Values.residentNetworkPolicy.egressPorts }}
        - port: {{ .port }}
          {{- if .protocol }}
          protocol: {{ .protocol }}
          {{- end }}
      {{- end }}
    {{- end }}
{{- end }}
