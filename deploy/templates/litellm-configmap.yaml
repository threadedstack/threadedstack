{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.litellm.configMapName | default (printf "%s-litellm-config" .Release.Name) }}
  labels:
    app.kubernetes.io/name: {{ .Values.litellm.name | default "litellm" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  litellm.config.yaml: |
    {{- $filePath := printf "%s/%s" .Values.litellm.configFilesPath .Values.litellm.configFileName }}
    {{- $fileContent := .Files.Get $filePath }}
    {{- if not $fileContent }}
    # HELM DEBUG: File {{ $filePath }} content is empty or file not found by Helm .Files.Get
    # Ensure the file exists at the chart path and is not empty.
    {{- else }}
{{ $fileContent | nindent 4 }}
    {{- end }}
{{- end }}