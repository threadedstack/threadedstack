{{- if $.Values.networkPolicy }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $.Values.networkPolicy.name | default "sandbox-egress-policy" | quote }}
  labels:
    "app.kubernetes.io/name": "tdsk-app"
    "app.kubernetes.io/component": {{ $.Release.Name | quote }}
    "app.kubernetes.io/managed-by": {{ $.Release.Service | quote }}
  annotations:
    "helm.sh/chart": "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
spec:
  podSelector:
    matchLabels:
      {{- range $key, $val := $.Values.networkPolicy.podSelector }}
      {{ $key }}: {{ $val | quote }}
      {{- end }}
  policyTypes:
    - Egress
  egress:
    # Allow traffic to backend only (for MITM proxy)
    - to:
        - podSelector:
            matchLabels:
              {{- range $key, $val := $.Values.networkPolicy.egressSelector }}
              {{ $key }}: {{ $val | quote }}
              {{- end }}
      ports:
      {{- range $.Values.networkPolicy.egressPorts }}
        - port: {{ .port }}
          {{- if .protocol }}
          protocol: {{ .protocol }}
          {{- end }}
      {{- end }}
    # Allow DNS resolution (unrestricted destination — kata VMs cannot reach ClusterIP)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
