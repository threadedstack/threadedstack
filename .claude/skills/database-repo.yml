## Schema Overview

### Core Tables

**12 main tables** organized by domain:

#### User & Team Management
- **`users`**: User accounts with Neon Auth integration
  - Fields: id, email, first, last, displayName, provider, photoUrl, timestamps
  - Unique index on email
  - Relations: teams (via roles), assets, threads, providers

- **`teams`**: Organizations/workspaces
  - Fields: id, name, description, timestamps
  - Relations: users (via roles), repos, assets, secrets, configs, providers

- **`roles`**: Many-to-many user-team relationships
  - Fields: id, userId, teamId, role, timestamps
  - Implements user team membership

#### Repository & Code Management
- **`repos`**: Project repositories
  - Fields: id, name, gitUrl, branch, teamId, meta (jsonb), timestamps
  - Relations: team, endpoints, functions, assets, secrets, configs, providers

- **`endpoints`**: API proxy endpoints
  - Fields: id, repoId, proxyUrl, proxyMethod, proxyHeaders (jsonb), proxyOptions (jsonb), public (boolean), timestamps
  - Relations: repo, functions

- **`functions`**: FaaS function definitions
  - Fields: id, endpointId, code, runtime, configuration, timestamps
  - Relations: endpoint

#### Configuration & Secrets
- **`configs`**: Configuration data (polymorphic - Exclusive Arc)
  - Fields: id, data (jsonb), userId?, teamId?, repoId?, timestamps
  - Constraint: Exactly ONE of userId/teamId/repoId must be set
  - Relations: user, team, repo

- **`secrets`**: Encrypted secrets (polymorphic - Exclusive Arc)
  - Fields: id, name, hashKey, encryptedValue, teamId?, repoId?, timestamps
  - Constraint: Exactly ONE of teamId/repoId must be set
  - Relations: team, repo

#### AI & Chat Features
- **`threads`**: Chat conversation threads
  - Fields: id, userId, title, metadata, timestamps
  - Relations: user, messages

- **`messages`**: Chat messages in threads
  - Fields: id, threadId, role, content, metadata, timestamps
  - Relations: thread

#### External Integration
- **`providers`**: External API provider configurations
  - Fields: id, name, type, credentials, userId?, teamId?, repoId?, timestamps
  - Relations: user, team, repo

- **`assets`**: File and asset storage
  - Fields: id, name, type, url, metadata, userId?, teamId?, repoId?, timestamps
  - Relations: user, team, repo

## Exclusive Arc Pattern

**Polymorphic relationships** are implemented using the **"Exclusive Arc"** pattern - ensuring a record belongs to exactly ONE parent entity, not multiple.

### Implementation Pattern

```typescript
// Example: secrets table belongs to EITHER team OR repo (not both)
export const secrets = pgTable(
  'secrets',
  {
    ...base,
    name: text('name').notNull(),
    hashKey: text('hash_key').notNull(),
    encryptedValue: text('encrypted_value').notNull(),

    // Nullable foreign keys
    teamId: uuid('team_id').references(() => teams.id, { onDelete: 'cascade' }),
    repoId: uuid('repo_id').references(() => repos.id, { onDelete: 'cascade' }),
  },
  (table) => [
    // Database constraint: exactly ONE must be set
    check(
      'secret_scope_check',
      sql`
        (${table.teamId} IS NOT NULL AND ${table.repoId} IS NULL) OR
        (${table.teamId} IS NULL AND ${table.repoId} IS NOT NULL)
      `
    ),
  ]
)
```

### Tables Using Exclusive Arc

1. **`secrets`**: teamId XOR repoId
2. **`configs`**: userId XOR teamId XOR repoId
3. **`assets`**: userId XOR teamId XOR repoId
4. **`providers`**: userId XOR teamId XOR repoId

### Constraint SQL Pattern

```sql
-- Two-way exclusive arc (e.g., secrets)
CHECK (
  (team_id IS NOT NULL AND repo_id IS NULL) OR
  (team_id IS NULL AND repo_id IS NOT NULL)
)

-- Three-way exclusive arc (e.g., configs)
CHECK (
  (
    (user_id IS NOT NULL)::int +
    (team_id IS NOT NULL)::int +
    (repo_id IS NOT NULL)::int
  ) = 1
)
```

**Benefits:**
- Enforces data integrity at database level
- Prevents orphaned records
- Clear ownership semantics
- Type-safe polymorphic queries

## Architecture

### 3-Layer Architecture

```
┌──────────────────────────────────────┐
│  Consumer Repos (backend, admin)    │  Import services
│  db.services.team.create()          │
└─────────────┬────────────────────────┘
              │
┌─────────────▼────────────────────────┐
│  Service Layer (src/services/)       │  Business logic
│  - Base class (CRUD operations)     │
│  - Specific services (Team, User)   │
└─────────────┬────────────────────────┘
              │
┌─────────────▼────────────────────────┐
│  Schema Layer (src/schemas/)         │  Data models
│  - Table definitions (Drizzle)      │
│  - Relations                         │
└─────────────┬────────────────────────┘
              │
┌─────────────▼────────────────────────┐
│  Database (PostgreSQL via Neon)      │  Data storage
└──────────────────────────────────────┘
```

### Database Singleton Pattern

```typescript
// src/database.ts
let _database: TDatabase

export const database = (cfg: TDBConfig = config) => {
  if (!_database) {
    _database = drizzle({
      client: new Pool({ connectionString: config.url })
    })

    // Auto-initialize services
    _database.services = Object.entries(DBservices).reduce((acc, [name, Service]) => {
      acc[name] = new Service({ db: _database, schema: undefined, config: cfg })
      return acc
    }, {} as TDBServices)
  }

  return _database
}
```

**Usage in other repos:**
```typescript
import { database } from '@TDB/database'

const db = database()
const { data, error } = await db.services.team.create({ name: 'My Team' })
```

## Logic Flow

### Service CRUD Flow

```
Client Request → Service Method → Drizzle Query → PostgreSQL → Response
```

**Example: Create Team**

```typescript
// 1. Client calls service
const { data, error } = await db.services.team.create({
  name: 'Acme Corp',
  description: 'Our company'
})

// 2. Service (base.ts) executes query
create = async (data: I): Promise<TDBApiRes<S>> => {
  try {
    const resp = await this.db
      .insert(this.schema)
      .values(data)
      .returning()

    return { data: resp[0] as S }
  } catch (error: any) {
    return { error }
  }
}

// 3. Drizzle translates to SQL
INSERT INTO teams (id, name, description, created_at, updated_at)
VALUES (uuid_generate_v4(), 'Acme Corp', 'Our company', now(), now())
RETURNING *;

// 4. PostgreSQL executes and returns row
// 5. Service returns { data: { id, name, description, ... } }
```

### Migration Flow

```bash
# 1. Modify schema file
# src/schemas/teams.ts - add new field

# 2. Generate migration
pnpm generate
# → Creates drizzle/0001_*.sql

# 3. Review generated SQL
# cat drizzle/0001_*.sql

# 4. Apply migration
pnpm migrate
# → Executes SQL against database

# 5. Verify in Drizzle Studio
pnpm studio
# → Opens web UI at localhost:4983
```

## Key Patterns

### 1. Base Schema Pattern

All tables share common fields via spread operator:

```typescript
// src/utils/schema/base.ts
export const base = {
  id: uuid('id').defaultRandom().primaryKey(),
  ...timestamps,
}

// src/utils/schema/timestamps.ts
export const timestamps = {
  createdAt: timestamp('created_at').defaultNow().notNull(),
  updatedAt: timestamp('updated_at').defaultNow(),
}

// Usage in schema
export const teams = pgTable('teams', {
  ...base,  // id, createdAt, updatedAt
  name: text('name').notNull(),
  description: text('description'),
})
```

### 2. Service Inheritance Pattern

All services extend Base class for consistent CRUD API:

```typescript
// src/services/team.ts
export class Team extends Base<typeof teams, TDBTeamSelect, TDBTeamInsert> {
  constructor(opts: TTeamOpts) {
    super({ ...opts, schema: teams })
  }

  // Inherits: create, get, list, update, upsert, delete
  // Can add custom methods here
}
```

### 3. Type Inference Pattern

Types are automatically inferred from schemas:

```typescript
// src/types/schema.types.ts
export type TDBTeamSelect = typeof teams.$inferSelect
export type TDBTeamInsert = typeof teams.$inferInsert

// Consumer usage - fully type-safe
const teamData: TDBTeamInsert = {
  name: 'Team A',
  description: 'Description'
}
const result: TDBApiRes<TDBTeamSelect> = await db.services.team.create(teamData)
```

### 4. Relation Definition Pattern

Drizzle relations are defined separately from table schemas:

```typescript
// Define table
export const teams = pgTable('teams', { ...base, name: text('name') })

// Define relations separately
export const teamsRelations = relations(teams, ({ many }) => ({
  users: many(roles),     // teams have many users via roles
  repos: many(repos),     // teams have many repos
  secrets: many(secrets), // teams have many secrets
}))
```

### 5. Cascade Deletion Pattern

Foreign keys use `onDelete: 'cascade'` to maintain referential integrity:

```typescript
repoId: uuid('repo_id')
  .references(() => repos.id, { onDelete: 'cascade' })
  .notNull()

// When repo is deleted, all related endpoints are automatically deleted
```

### 6. JSONB for Flexible Data

Complex/dynamic data stored as JSONB:

```typescript
export const repos = pgTable('repos', {
  ...base,
  meta: jsonb('meta'),           // Arbitrary metadata
  name: text('name').notNull(),
})

export const endpoints = pgTable('endpoints', {
  ...base,
  proxyHeaders: jsonb('proxy_headers'),  // Dynamic headers
  proxyOptions: jsonb('proxy_options'),  // Dynamic options
})
```

