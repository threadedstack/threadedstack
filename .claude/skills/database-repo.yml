## Commands

### Drizzle Kit Commands
```bash
# Generate migration from schema changes
pnpm generate

# Run pending migrations against database
pnpm migrate

# Introspect existing database schema
pnpm introspect

# Push schema changes without migrations (dev only)
pnpm push

# Open Drizzle Studio web UI (localhost:4983)
pnpm studio

# Upgrade migration files to latest format
pnpm up

# Check migration files for issues
pnpm check

# Drop migration files
pnpm drop

# Export schema as TypeScript/SQL
pnpm export

# Direct Drizzle Kit access
pnpm dk <command>
```

### Development Commands
```bash
# Run utility script with aliases
pnpm script

# Linting with Biome
pnpm lint          # Auto-fix issues
pnpm lint:ci       # CI mode (fail on errors)
pnpm lint:staged   # Lint staged files only

# Formatting with Biome
pnpm format        # Auto-format code
pnpm format:ci     # CI mode (fail on errors)
pnpm format:staged # Format staged files only

# Testing with Vitest
pnpm test

# Clean node_modules
pnpm clean
```

