name: Deploy Production

# Kubernetes deploy pipeline. All build/migrate/deploy/verify/rollback logic
# lives in the `tdsk` CLI (`tdsk release`) so CI and local deploys share one
# code path. This workflow only prepares the environment (kubeconfig, secrets,
# registry auth) and then hands off to `tdsk release --env production`.
#
# Trigger: every push to `main` (i.e. every merged PR) deploys. Deployment is
# handled by git — merging to main IS the deploy. The `production` branch is NOT
# a trigger; it is a MARKER: after a successful deploy the pipeline advances
# `production` to the just-deployed commit, so `origin/production` always equals
# the SHA actually running in the Civo production cluster. Never push to
# `production` by hand — it is machine-maintained and reflects deployed state.
#
# Frontends (admin/threads/website) deploy via firebase-hosting-merge.yml, so
# this workflow runs the release with --no-firebase.

on:
  push:
    branches: [main]
    # A commit that touches ONLY documentation/CI-agent notes needs no prod deploy
    # or test run. (paths-ignore skips the run only when EVERY changed file matches,
    # so any code change still deploys.) Workflow files are intentionally NOT ignored
    # so a fix to this pipeline can still trigger a deploy.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/**'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Rebuild and deploy every image (skip change detection)'
        type: boolean
        default: false
      skip_tests:
        description: 'Skip the test + type-check job'
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  # contents: write so the deploy job can advance the `production` marker branch
  # to the just-deployed commit after a successful release.
  contents: write
  packages: write

env:
  # Civo cluster name — its kube-context is also "tdsk", matching
  # deploy/values.production.yaml (TDSK_KUBE_CONTEXT).
  CIVO_CLUSTER: tdsk
  CIVO_REGION: NYC1
  K8S_NAMESPACE: tdsk-production
  REGISTRY: ghcr.io/threadedstack
  # Pin CLI versions — verify at: github.com/civo/cli/releases, github.com/loft-sh/devspace/releases
  CIVO_CLI_VERSION: "1.5.4"
  DEVSPACE_VERSION: "6.3.20"

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.skip_tests != true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pin to the repo's canonical Node (.nvmrc = 22.20.0). Floating to
          # `22` pulls the latest 22.x (22.23.1), whose require(esm) loader breaks
          # tsx 4.21.0's `-r` hook used by `pnpm cli` (ERR_METHOD_NOT_IMPLEMENTED
          # resolveSync). Keep CI on the version we actually develop against.
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Run type checks
        run: pnpm types

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test]
    # Run even when test is skipped via workflow_dispatch
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    env:
      NODE_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Full history so `tdsk release` can diff HEAD against the deployed SHA
        with:
          fetch-depth: 0

      - name: Install Civo CLI
        env:
          CIVO_TOKEN: ${{ secrets.TDSK_CIVO_TOKEN }}
        run: |
          curl -fsSL "https://github.com/civo/cli/releases/download/v${CIVO_CLI_VERSION}/civo-${CIVO_CLI_VERSION}-linux-amd64.tar.gz" -o civo.tar.gz
          tar xzf civo.tar.gz
          sudo mv civo /usr/local/bin/civo
          civo version
          civo apikey save deploy-key "$CIVO_TOKEN"
          # `civo region use` exits non-zero when the region is ALREADY selected
          # ("You are already using that region"), which under `bash -e` would fail
          # this step on a no-op. Tolerate that benign case; a genuinely wrong region
          # surfaces later at `civo kubernetes config`.
          civo region use "$CIVO_REGION" || true

      - name: Fetch kubeconfig
        run: |
          # civo CLI v1.5.4 dropped the --merge flag; --save now merges by default
          # (use --overwrite to replace). We then switch context explicitly below.
          civo kubernetes config "$CIVO_CLUSTER" --save
          kubectl config use-context tdsk
          echo "Verifying cluster access..."
          kubectl --context tdsk get ns "$K8S_NAMESPACE"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install DevSpace
        run: |
          curl -fsSL "https://github.com/loft-sh/devspace/releases/download/v${DEVSPACE_VERSION}/devspace-linux-amd64" -o devspace
          chmod +x devspace
          sudo mv devspace /usr/local/bin/devspace
          devspace --version

      - name: Set up QEMU
        # `tdsk release` builds multi-arch images (linux/amd64,linux/arm64); QEMU
        # provides the arm64 emulation so the cross-arch build doesn't fail on the
        # amd64 runner.
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pin to the repo's canonical Node (.nvmrc = 22.20.0). Floating to
          # `22` pulls the latest 22.x (22.23.1), whose require(esm) loader breaks
          # tsx 4.21.0's `-r` hook used by `pnpm cli` (ERR_METHOD_NOT_IMPLEMENTED
          # resolveSync). Keep CI on the version we actually develop against.
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required secrets
        env:
          TDSK_CIVO_TOKEN: ${{ secrets.TDSK_CIVO_TOKEN }}
          TDSK_MASTER_KEY: ${{ secrets.TDSK_MASTER_KEY }}
          TDSK_DB_URL: ${{ secrets.TDSK_DB_URL }}
          TDSK_DB_USER: ${{ secrets.TDSK_DB_USER }}
          TDSK_DB_PASS: ${{ secrets.TDSK_DB_PASS }}
          TDSK_DB_AUTH_URL: ${{ secrets.TDSK_DB_AUTH_URL }}
          TDSK_DB_PROJECT_ID: ${{ secrets.TDSK_DB_PROJECT_ID }}
          TDSK_PAY_ACCESS_TOKEN: ${{ secrets.TDSK_PAY_ACCESS_TOKEN }}
          TDSK_PAY_WEBHOOK_SECRET: ${{ secrets.TDSK_PAY_WEBHOOK_SECRET }}
          TDSK_EMAIL_API_KEY: ${{ secrets.TDSK_EMAIL_API_KEY }}
        run: |
          MISSING=""
          # `return 0` is REQUIRED: GitHub runs this step under `bash -e`, and a bare
          # `[ -z "$2" ] && ...` returns 1 when the secret IS present (the && short-
          # circuits), which would kill the step on the first non-empty secret.
          check() { [ -z "$2" ] && MISSING="$MISSING $1"; return 0; }
          check "TDSK_CIVO_TOKEN" "$TDSK_CIVO_TOKEN"
          check "TDSK_MASTER_KEY" "$TDSK_MASTER_KEY"
          check "TDSK_DB_URL" "$TDSK_DB_URL"
          check "TDSK_DB_USER" "$TDSK_DB_USER"
          check "TDSK_DB_PASS" "$TDSK_DB_PASS"
          check "TDSK_DB_AUTH_URL" "$TDSK_DB_AUTH_URL"
          check "TDSK_DB_PROJECT_ID" "$TDSK_DB_PROJECT_ID"
          check "TDSK_PAY_ACCESS_TOKEN" "$TDSK_PAY_ACCESS_TOKEN"
          check "TDSK_PAY_WEBHOOK_SECRET" "$TDSK_PAY_WEBHOOK_SECRET"
          check "TDSK_EMAIL_API_KEY" "$TDSK_EMAIL_API_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing GitHub secrets:$MISSING"
            echo "Add them at: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required secrets configured."

      - name: Assemble secrets YAML
        env:
          TDSK_MASTER_KEY: ${{ secrets.TDSK_MASTER_KEY }}
          TDSK_DB_URL: ${{ secrets.TDSK_DB_URL }}
          TDSK_DB_USER: ${{ secrets.TDSK_DB_USER }}
          TDSK_DB_PASS: ${{ secrets.TDSK_DB_PASS }}
          TDSK_DB_AUTH_URL: ${{ secrets.TDSK_DB_AUTH_URL }}
          TDSK_DB_PROJECT_ID: ${{ secrets.TDSK_DB_PROJECT_ID }}
          TDSK_PAY_ACCESS_TOKEN: ${{ secrets.TDSK_PAY_ACCESS_TOKEN }}
          TDSK_PAY_WEBHOOK_SECRET: ${{ secrets.TDSK_PAY_WEBHOOK_SECRET }}
          TDSK_EMAIL_API_KEY: ${{ secrets.TDSK_EMAIL_API_KEY }}
          TDSK_EGRESS_CA_CERT: ${{ secrets.TDSK_EGRESS_CA_CERT }}
          TDSK_EGRESS_CA_KEY: ${{ secrets.TDSK_EGRESS_CA_KEY }}
        run: |
          mkdir -p ~/.config/tdsk
          # Secrets arrive via the step `env:` block (safe pattern) and are
          # referenced as shell variables inside the (unquoted) heredoc.
          cat > ~/.config/tdsk/values.yaml << ENDOFYAML
          env:
            TDSK_MASTER_KEY: "$TDSK_MASTER_KEY"
            TDSK_DB_URL: "$TDSK_DB_URL"
            TDSK_DB_USER: "$TDSK_DB_USER"
            TDSK_DB_PASS: "$TDSK_DB_PASS"
            TDSK_DB_AUTH_URL: "$TDSK_DB_AUTH_URL"
            TDSK_DB_PROJECT_ID: "$TDSK_DB_PROJECT_ID"
            TDSK_PAY_ACCESS_TOKEN: "$TDSK_PAY_ACCESS_TOKEN"
            TDSK_PAY_WEBHOOK_SECRET: "$TDSK_PAY_WEBHOOK_SECRET"
            TDSK_EMAIL_API_KEY: "$TDSK_EMAIL_API_KEY"
            TDSK_EGRESS_CA_CERT: "$TDSK_EGRESS_CA_CERT"
            TDSK_EGRESS_CA_KEY: "$TDSK_EGRESS_CA_KEY"
          ENDOFYAML
          # Strip leading whitespace inherited from YAML indentation
          sed -i 's/^          //' ~/.config/tdsk/values.yaml

      - name: Release
        # `tdsk release` detects changed contexts vs the deployed SHA, builds +
        # pushes SHA-tagged images, pushes additive DB schema, deploys, and
        # verifies health with automatic rollback on failure. Frontends deploy
        # via firebase-hosting-merge.yml, so they are skipped here.
        #
        # DOCKER_USER/DOCKER_PASSWORD: the CLI's own `docker login` reads creds from
        # env (utils/docker/auth.ts); the earlier docker/login-action only writes
        # ~/.docker/config.json and exports nothing, so pass GHCR creds here too.
        env:
          FORCE_ALL: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_all) && '--all' || '' }}
          DOCKER_USER: ${{ github.actor }}
          DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd repos/cli
          pnpm cli release --env production --confirm --no-firebase $FORCE_ALL

      - name: Advance production marker
        # Runs only when the release above succeeded (default step condition).
        # Point the `production` branch at the exact commit we just deployed, so
        # `origin/production` is an accurate record of what is running in the
        # cluster. Force-update: `production` is machine-maintained here and is
        # simply set to the deployed SHA (it may have diverged historically).
        run: |
          DEPLOYED_SHA="${GITHUB_SHA}"
          echo "Advancing production marker to ${DEPLOYED_SHA}"
          git push --force origin "${DEPLOYED_SHA}:refs/heads/production"
