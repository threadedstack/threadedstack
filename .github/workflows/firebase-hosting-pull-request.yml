name: Deploy to Firebase Hosting on PR
on:
  pull_request:
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'repos/admin/**'
      - 'repos/threads/**'
      - 'repos/website/**'
      - 'repos/domain/**'
      - 'repos/components/**'
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: admin
            package: '@tdsk/admin'
          - target: threads
            package: '@tdsk/threads'
          - target: website
            package: '@tdsk/website'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ${{ matrix.package }} build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_THREADED_STACK_PROD }}'
          projectId: threaded-stack-prod
          target: ${{ matrix.target }}
