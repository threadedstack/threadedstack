name: Deploy to Firebase Hosting on merge
# Frontends (admin/threads/website) deploy on every push to `main` — the same
# trigger as the K8s deploy (deploy-production.yml). Merging to main IS the deploy
# for both backend services and frontends. The `production` branch is a post-deploy
# marker maintained by deploy-production.yml, not a trigger.
#
# NOTE: a per-target change-gated version (only redeploy the UIs whose code changed)
# was attempted but GitHub rejected the workflow (no valid runs after it landed), so
# it was reverted to this proven-working form. Re-attempt the optimization only after
# validating locally with `actionlint`. See project memory: firebase per-target deploy.
on:
  push:
    branches: [main]
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: admin
            package: '@tdsk/admin'
          - target: threads
            package: '@tdsk/threads'
          - target: website
            package: '@tdsk/website'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ${{ matrix.package }} build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_THREADED_STACK_PROD }}'
          channelId: live
          projectId: threaded-stack-prod
          target: ${{ matrix.target }}
