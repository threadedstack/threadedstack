name: Publish TSA to npm

on:
  push:
    branches: [production]
    paths:
      - 'repos/tsa/src/**'
      - 'repos/tsa/scripts/**'
      - 'repos/tsa/package.json'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual publish)'
        type: boolean
        default: false

concurrency:
  group: publish-tsa
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: cd repos/tsa && pnpm test

      - name: Run type checks
        run: cd repos/tsa && pnpm types

  release:
    name: Build & Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release
        if: inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd repos/tsa && npx semantic-release-plus

      - name: Dry run — build and inspect
        if: inputs.dry_run == true
        run: |
          cd repos/tsa && bun run build:publish
          echo ""
          echo "=== Platform binaries ==="
          for dir in npm/*/; do
            PLATFORM=$(basename "$dir")
            BIN=$(ls "$dir"tsa* 2>/dev/null | head -1)
            if [ -n "$BIN" ]; then
              SIZE=$(stat -c%s "$BIN" 2>/dev/null || stat -f%z "$BIN")
              echo "  $PLATFORM: $(basename "$BIN") ($SIZE bytes)"
            else
              echo "  $PLATFORM: MISSING"
            fi
          done
          echo ""
          echo "=== Dispatcher package ==="
          npm pack --dry-run
