name: ci/infra-staging

# PR gate for infra changes. The required status check registered on main is
# `ci/infra-staging`. Branch protection is applied by the user AFTER this workflow
# is confirmed to run green on a real infra PR -- do NOT touch protection here.
#
# When a PR touches `.github/workflows/` or `deploy/`, the workflow deploys the
# change to the tdsk-staging namespace and runs inline health probes. Green means
# the PR is eligible to merge (still requires the threadedstack-adversary review
# and the normal ci/types + ci/test checks). Red blocks merge.
#
# When a PR does NOT touch infra, the detect step exits early and the job passes
# immediately so app PRs are never delayed by the staging deploy.
#
# Auth/registry steps mirror deploy-production.yml exactly (same Civo CLI version,
# same secret names, same kubeconfig fetch pattern, same GHCR login).

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-infra-staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  CIVO_CLUSTER: tdsk
  CIVO_REGION: NYC1
  K8S_NAMESPACE: tdsk-staging
  REGISTRY: ghcr.io/threadedstack
  CIVO_CLI_VERSION: "1.5.4"
  DEVSPACE_VERSION: "6.3.20"

jobs:
  ci-infra-staging:
    name: ci/infra-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 1: Detect. If this PR does NOT touch infra, exit early (green no-op) so
      # app PRs never wait on the staging deploy.
      - name: Detect infra PR
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.base_ref }}
        shell: bash
        run: |
          # Ensure the base ref is present locally for the diff.
          git fetch origin "$BASE_REF" --depth=1 || true
          # Regex for infra paths -- match at line start.
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '^(\.github/workflows/|deploy/)' > /dev/null; then
            echo "infra=true" >> "$GITHUB_OUTPUT"
            echo "Infra PR detected; running staging deploy + verify."
          else
            echo "infra=false" >> "$GITHUB_OUTPUT"
            echo "Non-infra PR; ci/infra-staging is a green no-op."
          fi

      # The remaining steps ALL gate on the detect output. When infra=false,
      # `if: steps.detect.outputs.infra == 'true'` skips them and the job passes.

      - name: Setup pnpm
        if: steps.detect.outputs.infra == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.detect.outputs.infra == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        if: steps.detect.outputs.infra == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Civo CLI
        if: steps.detect.outputs.infra == 'true'
        env:
          CIVO_TOKEN: ${{ secrets.TDSK_CIVO_TOKEN }}
        run: |
          curl -fsSL "https://github.com/civo/cli/releases/download/v${CIVO_CLI_VERSION}/civo-${CIVO_CLI_VERSION}-linux-amd64.tar.gz" -o civo.tar.gz
          tar xzf civo.tar.gz
          sudo mv civo /usr/local/bin/civo
          civo version
          civo apikey save deploy-key "$CIVO_TOKEN"
          civo region use "$CIVO_REGION" || true

      - name: Fetch kubeconfig
        if: steps.detect.outputs.infra == 'true'
        run: |
          # civo CLI v1.5.4 --save merges by default (no --merge flag needed).
          civo kubernetes config "$CIVO_CLUSTER" --save
          kubectl config use-context tdsk
          echo "Verifying cluster access..."
          kubectl --context tdsk get ns "$K8S_NAMESPACE"

      - name: Install Helm
        if: steps.detect.outputs.infra == 'true'
        uses: azure/setup-helm@v4

      - name: Install DevSpace
        if: steps.detect.outputs.infra == 'true'
        run: |
          curl -fsSL "https://github.com/loft-sh/devspace/releases/download/v${DEVSPACE_VERSION}/devspace-linux-amd64" -o devspace
          chmod +x devspace
          sudo mv devspace /usr/local/bin/devspace
          devspace --version

      - name: Set up Docker Buildx
        if: steps.detect.outputs.infra == 'true'
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Login to GHCR
        if: steps.detect.outputs.infra == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate required secrets
        if: steps.detect.outputs.infra == 'true'
        env:
          TDSK_CIVO_TOKEN: ${{ secrets.TDSK_CIVO_TOKEN }}
          TDSK_MASTER_KEY: ${{ secrets.TDSK_MASTER_KEY }}
          TDSK_DB_URL: ${{ secrets.TDSK_DB_URL }}
          TDSK_DB_USER: ${{ secrets.TDSK_DB_USER }}
          TDSK_DB_PASS: ${{ secrets.TDSK_DB_PASS }}
          TDSK_DB_AUTH_URL: ${{ secrets.TDSK_DB_AUTH_URL }}
          TDSK_DB_PROJECT_ID: ${{ secrets.TDSK_DB_PROJECT_ID }}
          TDSK_PAY_ACCESS_TOKEN: ${{ secrets.TDSK_PAY_ACCESS_TOKEN }}
          TDSK_PAY_WEBHOOK_SECRET: ${{ secrets.TDSK_PAY_WEBHOOK_SECRET }}
          TDSK_EMAIL_API_KEY: ${{ secrets.TDSK_EMAIL_API_KEY }}
        run: |
          MISSING=""
          check() { [ -z "$2" ] && MISSING="$MISSING $1"; return 0; }
          check "TDSK_CIVO_TOKEN" "$TDSK_CIVO_TOKEN"
          check "TDSK_MASTER_KEY" "$TDSK_MASTER_KEY"
          check "TDSK_DB_URL" "$TDSK_DB_URL"
          check "TDSK_DB_USER" "$TDSK_DB_USER"
          check "TDSK_DB_PASS" "$TDSK_DB_PASS"
          check "TDSK_DB_AUTH_URL" "$TDSK_DB_AUTH_URL"
          check "TDSK_DB_PROJECT_ID" "$TDSK_DB_PROJECT_ID"
          check "TDSK_PAY_ACCESS_TOKEN" "$TDSK_PAY_ACCESS_TOKEN"
          check "TDSK_PAY_WEBHOOK_SECRET" "$TDSK_PAY_WEBHOOK_SECRET"
          check "TDSK_EMAIL_API_KEY" "$TDSK_EMAIL_API_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing GitHub secrets:$MISSING"
            echo "Add them at: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required secrets configured."

      - name: Assemble secrets YAML
        if: steps.detect.outputs.infra == 'true'
        env:
          TDSK_MASTER_KEY: ${{ secrets.TDSK_MASTER_KEY }}
          TDSK_DB_URL: ${{ secrets.TDSK_DB_URL }}
          TDSK_DB_USER: ${{ secrets.TDSK_DB_USER }}
          TDSK_DB_PASS: ${{ secrets.TDSK_DB_PASS }}
          TDSK_DB_AUTH_URL: ${{ secrets.TDSK_DB_AUTH_URL }}
          TDSK_DB_PROJECT_ID: ${{ secrets.TDSK_DB_PROJECT_ID }}
          TDSK_PAY_ACCESS_TOKEN: ${{ secrets.TDSK_PAY_ACCESS_TOKEN }}
          TDSK_PAY_WEBHOOK_SECRET: ${{ secrets.TDSK_PAY_WEBHOOK_SECRET }}
          TDSK_EMAIL_API_KEY: ${{ secrets.TDSK_EMAIL_API_KEY }}
          TDSK_EGRESS_CA_CERT: ${{ secrets.TDSK_EGRESS_CA_CERT }}
          TDSK_EGRESS_CA_KEY: ${{ secrets.TDSK_EGRESS_CA_KEY }}
        run: |
          mkdir -p ~/.config/tdsk
          cat > ~/.config/tdsk/values.yaml << ENDOFYAML
          env:
            TDSK_MASTER_KEY: "$TDSK_MASTER_KEY"
            TDSK_DB_URL: "$TDSK_DB_URL"
            TDSK_DB_USER: "$TDSK_DB_USER"
            TDSK_DB_PASS: "$TDSK_DB_PASS"
            TDSK_DB_AUTH_URL: "$TDSK_DB_AUTH_URL"
            TDSK_DB_PROJECT_ID: "$TDSK_DB_PROJECT_ID"
            TDSK_PAY_ACCESS_TOKEN: "$TDSK_PAY_ACCESS_TOKEN"
            TDSK_PAY_WEBHOOK_SECRET: "$TDSK_PAY_WEBHOOK_SECRET"
            TDSK_EMAIL_API_KEY: "$TDSK_EMAIL_API_KEY"
            TDSK_EGRESS_CA_CERT: "$TDSK_EGRESS_CA_CERT"
            TDSK_EGRESS_CA_KEY: "$TDSK_EGRESS_CA_KEY"
          ENDOFYAML
          sed -i 's/^          //' ~/.config/tdsk/values.yaml

      # STAGING DEPLOY: NODE_ENV=staging + --env staging picks up values.staging.yaml.
      # --no-firebase: frontends deploy via firebase-hosting-merge.yml on merge to main,
      # not as part of the staging infra gate.
      - name: tdsk release --env staging --confirm
        if: steps.detect.outputs.infra == 'true'
        env:
          NODE_ENV: staging
          DOCKER_USER: ${{ github.actor }}
          DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd repos/cli
          pnpm cli release --env staging --confirm --no-firebase

      # STAGING VERIFY: minimal inline health probes.
      # Inline staging probes; the shared verifyDeploy probe (E3) exposes the
      # same checks via a CLI helper and both must remain in sync.
      - name: Verify staging health
        if: steps.detect.outputs.infra == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Give the rollout up to ~2 min (24 * 5s) to become ready.
          for i in $(seq 1 24); do
            if curl -fsS -m 10 https://px-staging.threadedstack.app/health > /tmp/px.json \
               && curl -fsS -m 10 https://px-staging.threadedstack.app/_/health > /tmp/be.json; then
              PX_STATUS=$(jq -r .status /tmp/px.json)
              BE_STATUS=$(jq -r .status /tmp/be.json)
              if [[ "$PX_STATUS" == "ok" && "$BE_STATUS" == "ok" ]]; then
                echo "Staging health: OK (proxy=$PX_STATUS backend=$BE_STATUS)"
                exit 0
              fi
              echo "Attempt $i/24: proxy=$PX_STATUS backend=$BE_STATUS -- waiting..."
            else
              echo "Attempt $i/24: curl failed -- waiting..."
            fi
            sleep 5
          done
          echo "Staging verify FAILED after 2 min"
          echo "--- proxy health response ---"
          cat /tmp/px.json 2>/dev/null || echo "(no response)"
          echo "--- backend health response ---"
          cat /tmp/be.json 2>/dev/null || echo "(no response)"
          exit 1
