<!-- APPROVED VISUAL: Design Direction — Rich Dashboard (dark themed, Vercel/GitHub Actions aesthetic) -->
<!-- Approved: 2026-04-15 -->
<div style="background: #0f172a; border-radius: 8px; padding: 20px; font-family: -apple-system, system-ui, sans-serif; font-size: 13px; color: #e2e8f0;">
  <!-- Top bar with status counters -->
  <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 16px;">
    <div style="display: flex; align-items: center; gap: 6px; background: #1e293b; padding: 6px 12px; border-radius: 6px;">
      <div style="width: 8px; height: 8px; border-radius: 50%; background: #22c55e;"></div>
      <span style="font-weight: 600; font-size: 13px;">Claude Code</span>
    </div>
    <div style="display: flex; gap: 4px; margin-left: auto;">
      <span style="background: #1e293b; padding: 4px 10px; border-radius: 4px; font-size: 11px; color: #94a3b8;">3 files read</span>
      <span style="background: #1e293b; padding: 4px 10px; border-radius: 4px; font-size: 11px; color: #94a3b8;">1 edit</span>
      <span style="background: #422006; padding: 4px 10px; border-radius: 4px; font-size: 11px; color: #fdba74;">1 pending</span>
    </div>
  </div>

  <!-- Activity cards with colored left borders -->
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
    <div style="background: #1e293b; border-radius: 8px; padding: 12px; border-left: 3px solid #3b82f6;">
      <div style="font-size: 11px; color: #64748b; margin-bottom: 4px;">READING</div>
      <div style="font-size: 12px; font-weight: 500;">Header.tsx</div>
      <div style="font-size: 11px; color: #64748b; margin-top: 4px;">Component structure analysis</div>
    </div>
    <div style="background: #1e293b; border-radius: 8px; padding: 12px; border-left: 3px solid #f59e0b;">
      <div style="font-size: 11px; color: #64748b; margin-bottom: 4px;">EDITING</div>
      <div style="font-size: 12px; font-weight: 500;">Header.tsx</div>
      <div style="font-size: 11px; color: #64748b; margin-top: 4px;">+1 / -1 lines changed</div>
    </div>
  </div>

  <!-- Approval prompt with inline diff -->
  <div style="background: #1e293b; border-radius: 8px; padding: 14px; border: 1px solid #f59e0b40;">
    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
      <span style="color: #fbbf24; font-size: 16px;">&#9888;</span>
      <span style="font-weight: 600; font-size: 13px;">Approval Required</span>
    </div>
    <div style="color: #94a3b8; font-size: 12px; margin-bottom: 12px;">Claude wants to edit <strong style="color: #e2e8f0;">src/components/Header.tsx</strong></div>
    <div style="background: #0f172a; border-radius: 6px; padding: 10px; margin-bottom: 12px; font-family: monospace; font-size: 11px;">
      <div style="color: #4ade80;">+ import { UserMenu } from './UserMenu'</div>
      <div style="color: #f87171;">- import { BasicMenu } from './BasicMenu'</div>
    </div>
    <div style="display: flex; gap: 8px;">
      <button style="background: #22c55e; color: #0f172a; border: none; padding: 8px 24px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;">Approve</button>
      <button style="background: #334155; color: #94a3b8; border: none; padding: 8px 24px; border-radius: 6px; font-size: 12px; cursor: pointer;">Reject</button>
    </div>
  </div>
</div>
